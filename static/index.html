<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MovieDB — Find your next movie</title>
  <style>
    :root {
      color-scheme: dark;
      --imdb-gold: #f5c518;
      --imdb-gold-hover: #e2b200;
      --bg: #000000;
      --bg-elevated: #1a1a1a;
      --bg-card: #1f1f1f;
      --border: #2b2b2b;
      --text: #ffffff;
      --text-dim: #bdbdbd;
      --text-faint: #808080;
    }
    * { box-sizing: border-box; }
    body {
      font-family: Roboto, Arial, system-ui, sans-serif;
      margin: 0; background: var(--bg); color: var(--text);
    }

    /* ---- Header / nav bar ---- */
    header {
      display: flex; align-items: center; gap: 1rem;
      padding: .85rem 1.5rem; background: #121212;
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
    }
    .logo {
      background: var(--imdb-gold); color: #000;
      font-weight: 800; font-size: 1.15rem; letter-spacing: -.5px;
      padding: .28rem .55rem; border-radius: 6px;
    }
    .tagline { color: var(--text-dim); font-size: .95rem; font-weight: 500; }

    /* ---- Filter bar ---- */
    .filters {
      display: flex; flex-wrap: wrap; gap: 1rem; align-items: end;
      padding: 1.25rem 1.5rem; background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
    }
    .field { display: flex; flex-direction: column; gap: .4rem; }
    label {
      font-size: .72rem; text-transform: uppercase; letter-spacing: .05em;
      color: var(--text-faint); font-weight: 700;
    }
    select, input {
      background: #2b2b2b; color: var(--text); border: 1px solid #3a3a3a;
      border-radius: 4px; padding: .55rem .65rem; font-size: .9rem; font-family: inherit;
    }
    select:focus, input:focus { outline: 2px solid var(--imdb-gold); outline-offset: -1px; }
    select[multiple] { min-width: 170px; height: 120px; }
    select:not([multiple]) { min-width: 145px; }
    #sortBy, #sortDir { min-width: 155px; }
    button {
      background: var(--imdb-gold); color: #000; border: none; border-radius: 4px;
      padding: .62rem 1.4rem; font-size: .92rem; font-weight: 700; cursor: pointer;
      transition: background .15s ease;
    }
    button:hover { background: var(--imdb-gold-hover); }
    button:disabled {
      background: #3a3a3a; color: var(--text-faint); cursor: not-allowed;
    }

    /* ---- Results ---- */
    /* ---- Collection chips (fine-grained sub-genres) ---- */
    .collections {
      display: flex; gap: .5rem; overflow-x: auto; padding: 1.1rem 1.5rem .35rem;
      scrollbar-width: thin;
    }
    .coll-chip {
      white-space: nowrap; background: #2b2b2b; color: var(--text-dim);
      border: 1px solid #3a3a3a; border-radius: 999px; padding: .42rem .85rem;
      font-size: .82rem; font-family: inherit; cursor: pointer;
      display: flex; align-items: center; gap: .35rem; transition: all .12s ease;
    }
    .coll-chip:hover { border-color: var(--imdb-gold); color: #fff; }
    .coll-chip.active {
      background: var(--imdb-gold); color: #000; border-color: var(--imdb-gold); font-weight: 700;
    }
    .coll-chip .cnt { opacity: .55; font-size: .72rem; }
    .coll-chip.active .cnt { opacity: .7; }

    .meta {
      padding: 1.25rem 1.5rem .25rem; font-size: 1.05rem; font-weight: 600;
    }
    .meta span { color: var(--text-faint); font-weight: 400; font-size: .9rem; }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.5rem 1.1rem; padding: 1rem 1.5rem 1.25rem;
    }
    .pager {
      display: flex; align-items: center; justify-content: center; gap: .9rem;
      padding: .25rem 1.5rem 3rem;
    }
    .pager button { min-width: 105px; }
    .pager .page-label {
      color: var(--text-dim); font-size: .9rem; min-width: 72px; text-align: center;
    }
    .card {
      background: var(--bg-card); border-radius: 10px; overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.5); transition: transform .15s ease, box-shadow .15s ease;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,.6); }
    .poster-wrap { position: relative; }
    .card img {
      width: 100%; aspect-ratio: 2/3; object-fit: cover;
      background: #2b2b2b; display: block;
    }
    /* Fallback poster shown when a movie has no image. */
    .poster-fallback {
      width: 100%; aspect-ratio: 2/3; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: .5rem;
      padding: 1rem; text-align: center;
    }
    .poster-fallback .ttl { font-size: .95rem; font-weight: 700; line-height: 1.25; color: #fff; }
    .poster-fallback .ico { font-size: 1.6rem; opacity: .55; }
    .rating-badge {
      position: absolute; top: .5rem; left: .5rem;
      background: rgba(0,0,0,.7); backdrop-filter: blur(2px);
      border-radius: 4px; padding: .2rem .45rem;
      display: flex; align-items: center; gap: .25rem;
      font-size: .82rem; font-weight: 700;
    }
    .rating-badge .star { color: var(--imdb-gold); }
    .card .body { padding: .65rem .75rem .9rem; }
    .card .title {
      font-size: .95rem; font-weight: 600; margin: 0 0 .3rem; line-height: 1.25;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card .year { font-size: .82rem; color: var(--text-dim); }
    .card .genres { font-size: .74rem; color: var(--text-faint); margin-top: .4rem; }
    .card { cursor: pointer; }
    .empty { padding: 4rem 2rem; text-align: center; color: var(--text-faint); grid-column: 1 / -1; }

    /* ---- Detail modal ---- */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.82); z-index: 50;
      display: none; align-items: flex-start; justify-content: center;
      padding: 3rem 1rem; overflow-y: auto;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      position: relative; background: #181818; border: 1px solid var(--border);
      border-radius: 14px; max-width: 880px; width: 100%;
    }
    .modal-close {
      position: absolute; top: .75rem; right: .9rem; z-index: 2;
      background: rgba(0,0,0,.5); color: #fff; border: none; border-radius: 50%;
      width: 34px; height: 34px; font-size: 1.2rem; line-height: 1; cursor: pointer;
    }
    .modal-close:hover { background: rgba(0,0,0,.8); }
    .modal-hero { display: flex; gap: 1.5rem; padding: 1.5rem; }
    .modal-poster { width: 200px; flex-shrink: 0; border-radius: 10px; overflow: hidden; }
    .modal-poster img, .modal-poster .poster-fallback { border-radius: 10px; }
    .modal-info { flex: 1; min-width: 0; }
    .modal-info h2 { margin: 0 .5rem 0 0; font-size: 1.55rem; line-height: 1.2; }
    .modal-meta {
      display: flex; flex-wrap: wrap; gap: .35rem 1rem; align-items: center;
      color: var(--text-dim); font-size: .9rem; margin: .75rem 0 1rem;
    }
    .modal-meta .rating { color: var(--imdb-gold); font-weight: 700; }
    .genre-chips { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: 1.1rem; }
    .chip {
      background: #2b2b2b; border: 1px solid #3a3a3a; border-radius: 999px;
      padding: .25rem .7rem; font-size: .78rem; color: var(--text-dim);
    }
    .modal-overview { color: var(--text-dim); line-height: 1.6; font-size: .95rem; }
    .similar { padding: 0 1.5rem 1.5rem; }
    .similar h3 { font-size: 1rem; margin: .5rem 0 1rem; }
    .similar-row {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 1rem;
    }
    .mini { cursor: pointer; }
    .mini .poster-wrap { position: relative; border-radius: 8px; overflow: hidden; }
    .mini img, .mini .poster-fallback { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
    .mini .poster-fallback { padding: .4rem; gap: .25rem; }
    .mini .poster-fallback .ico { font-size: 1rem; }
    .mini .poster-fallback .ttl { font-size: .62rem; font-weight: 700; }
    .mini .rating-badge { font-size: .68rem; padding: .12rem .35rem; top: .3rem; left: .3rem; }
    .mini .mtitle {
      font-size: .8rem; margin-top: .4rem; line-height: 1.25;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .mini .shared { font-size: .72rem; color: var(--imdb-gold); margin-top: .15rem; }
    @media (max-width: 560px) {
      .modal-hero { flex-direction: column; }
      .modal-poster { width: 140px; }
    }

    /* ---- AI companion chat ---- */
    .chat-fab {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 40;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--imdb-gold); color: #000; border: none; cursor: pointer;
      font-size: 1.5rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,.5); transition: transform .12s ease, background .15s ease;
    }
    .chat-fab:hover { transform: scale(1.06); }
    .chat-fab:hover { background: var(--imdb-gold-hover); }
    .chat-panel {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 41;
      width: 370px; max-width: calc(100vw - 2rem);
      height: 540px; max-height: calc(100vh - 3rem);
      background: #1a1a1a; border: 1px solid var(--border); border-radius: 14px;
      display: none; flex-direction: column; overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,.6);
    }
    .chat-panel.open { display: flex; }
    .chat-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: .8rem 1rem; background: #121212; border-bottom: 1px solid var(--border);
    }
    .chat-head .t { font-weight: 700; font-size: .95rem; }
    .chat-head .t small { display: block; color: var(--text-faint); font-weight: 400; font-size: .7rem; }
    .chat-close { background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; }
    .chat-log { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: .75rem; }
    .msg { max-width: 85%; padding: .6rem .8rem; border-radius: 12px; font-size: .9rem; line-height: 1.45; white-space: pre-wrap; }
    .msg.user { align-self: flex-end; background: var(--imdb-gold); color: #000; }
    .msg.bot { align-self: flex-start; background: #2b2b2b; color: var(--text); }
    .msg.bot.err { background: #3a2020; color: #ffb4b4; }
    .typing { align-self: flex-start; color: var(--text-faint); font-size: .85rem; font-style: italic; }
    .chat-movies {
      align-self: flex-start; width: 100%;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem; margin-top: .25rem;
    }
    .chat-movies .mini .poster-wrap { border-radius: 6px; }
    .chat-movies .mini .mtitle { font-size: .7rem; }
    .chat-form { display: flex; gap: .5rem; padding: .7rem; border-top: 1px solid var(--border); background: #121212; }
    .chat-form input { flex: 1; }
    .chat-form button { padding: .5rem .9rem; }
  </style>
</head>
<body>
  <header>
    <span class="logo">MovieDB</span>
    <span class="tagline">Find your next movie</span>
  </header>

  <div class="filters">
    <div class="field">
      <label for="genres">Genres</label>
      <select id="genres" multiple></select>
    </div>
    <div class="field">
      <label for="genreMatch">Match</label>
      <select id="genreMatch">
        <option value="any">Any selected</option>
        <option value="all">All selected</option>
      </select>
    </div>
    <div class="field">
      <label for="yearMin">Year from</label>
      <input id="yearMin" type="number" placeholder="1900" min="1900" max="2100" />
    </div>
    <div class="field">
      <label for="yearMax">Year to</label>
      <input id="yearMax" type="number" placeholder="2026" min="1900" max="2100" />
    </div>
    <div class="field">
      <label for="ratingMin">Min rating</label>
      <input id="ratingMin" type="number" placeholder="0" min="0" max="10" step="0.5" />
    </div>
    <div class="field">
      <label for="sortBy">Sort by</label>
      <select id="sortBy">
        <option value="popularity">Popularity</option>
        <option value="rating">Rating</option>
        <option value="year">Year</option>
        <option value="title">Title</option>
      </select>
    </div>
    <div class="field">
      <label for="sortDir">Order</label>
      <select id="sortDir">
        <option value="desc">High to low</option>
        <option value="asc">Low to high</option>
      </select>
    </div>
    <button id="search">Search</button>
  </div>

  <div class="collections" id="collections"></div>
  <div class="meta" id="meta"></div>
  <div class="grid" id="results"></div>
  <div class="pager" id="pager"></div>

  <div class="modal-backdrop" id="modal">
    <div class="modal" id="modalContent"></div>
  </div>

  <button class="chat-fab" id="chatFab" title="Ask the AI movie companion" aria-label="Ask the AI movie companion">🤖</button>
  <div class="chat-panel" id="chatPanel">
    <div class="chat-head">
      <div class="t">🎬 Movie Companion<small>Ask for a recommendation</small></div>
      <button class="chat-close" id="chatClose" aria-label="Close">×</button>
    </div>
    <div class="chat-log" id="chatLog"></div>
    <form class="chat-form" id="chatForm">
      <input id="chatInput" type="text" placeholder="e.g. a short feel-good sci-fi" autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let activeCollection = null;  // currently selected sub-genre slug, or null
    let currentPage = 0;
    const PAGE_SIZE = 50;

    // Deterministic dark gradient per title, so each fallback poster is distinct.
    function gradientFor(title) {
      let h = 0;
      for (let i = 0; i < title.length; i++) h = (h * 31 + title.charCodeAt(i)) % 360;
      return `linear-gradient(150deg, hsl(${h} 45% 22%), hsl(${(h + 40) % 360} 50% 12%))`;
    }

    async function loadGenres() {
      const genres = await fetch("/api/genres").then(r => r.json());
      $("genres").innerHTML = genres
        .map(g => `<option value="${g.id}">${g.name}</option>`)
        .join("");
    }

    function buildQuery() {
      const params = new URLSearchParams();
      [...$("genres").selectedOptions].forEach(o => params.append("genres", o.value));
      params.set("genre_match", $("genreMatch").value);
      const add = (key, val) => { if (val !== "" && val != null) params.set(key, val); };
      add("year_min", $("yearMin").value);
      add("year_max", $("yearMax").value);
      add("rating_min", $("ratingMin").value);
      if (activeCollection) params.set("collection", activeCollection);
      params.set("sort_by", $("sortBy").value);
      params.set("sort_dir", $("sortDir").value);
      params.set("limit", PAGE_SIZE);
      params.set("offset", currentPage * PAGE_SIZE);
      return params.toString();
    }

    async function loadCollections() {
      const cs = await fetch("/api/collections").then(r => r.json());
      const chips = ['<button class="coll-chip active" data-slug="">All</button>'];
      for (const c of cs) {
        chips.push(
          `<button class="coll-chip" data-slug="${c.slug}">${c.emoji} ${c.label}` +
          ` <span class="cnt">${c.count}</span></button>`
        );
      }
      const bar = $("collections");
      bar.innerHTML = chips.join("");
      bar.addEventListener("click", (e) => {
        const chip = e.target.closest(".coll-chip");
        if (!chip) return;
        activeCollection = chip.dataset.slug || null;
        bar.querySelectorAll(".coll-chip").forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
        currentPage = 0;
        search();
      });
    }

    // Poster image, or a gradient fallback when there's no image.
    function posterHTML(m) {
      return m.poster_url
        ? `<img src="${m.poster_url}" alt="${m.title} poster" loading="lazy" />`
        : `<div class="poster-fallback" style="background:${gradientFor(m.title)}">
             <span class="ico">🎬</span>
             <span class="ttl">${m.title}</span>
           </div>`;
    }

    function ratingBadge(m) {
      return m.rating
        ? `<div class="rating-badge"><span class="star">★</span>${m.rating.toFixed(1)}</div>`
        : "";
    }

    function card(m) {
      return `
        <div class="card" data-id="${m.id}">
          <div class="poster-wrap">${posterHTML(m)}${ratingBadge(m)}</div>
          <div class="body">
            <p class="title">${m.title}</p>
            <span class="year">${m.release_year ?? "—"}</span>
            <div class="genres">${(m.genres || []).join(" • ")}</div>
          </div>
        </div>`;
    }

    // --- Detail modal + "more like this" ---
    const modal = $("modal");

    function miniCard(m) {
      const shared = m.shared_genres
        ? `<div class="shared">${m.shared_genres} shared genre${m.shared_genres === 1 ? "" : "s"}</div>`
        : "";
      return `
        <div class="mini" data-id="${m.id}">
          <div class="poster-wrap">${posterHTML(m)}${ratingBadge(m)}</div>
          <div class="mtitle">${m.title}</div>
          ${shared}
        </div>`;
    }

    function renderModal(m, similar) {
      const lang = m.original_language ? m.original_language.toUpperCase() : "—";
      const runtime = m.runtime ? `${m.runtime} min` : "Runtime n/a";
      const votes = m.vote_count ? `${m.vote_count.toLocaleString()} votes` : "";
      const similarRow = similar.length
        ? similar.map(miniCard).join("")
        : `<p style="color:var(--text-faint)">No similar titles found.</p>`;
      $("modalContent").innerHTML = `
        <button class="modal-close" aria-label="Close">×</button>
        <div class="modal-hero">
          <div class="modal-poster">${posterHTML(m)}</div>
          <div class="modal-info">
            <h2>${m.title}</h2>
            <div class="modal-meta">
              <span class="rating">★ ${m.rating ? m.rating.toFixed(1) : "–"}</span>
              <span>${m.release_year ?? "—"}</span>
              <span>${runtime}</span>
              <span>${lang}</span>
              <span>${votes}</span>
            </div>
            <div class="genre-chips">
              ${(m.genres || []).map(g => `<span class="chip">${g}</span>`).join("")}
            </div>
            <p class="modal-overview">${m.overview || "No overview available."}</p>
          </div>
        </div>
        <div class="similar">
          <h3>More like this</h3>
          <div class="similar-row">${similarRow}</div>
        </div>`;
    }

    async function openDetail(id) {
      const [movie, sim] = await Promise.all([
        fetch(`/api/movies/${id}`).then(r => r.json()),
        fetch(`/api/movies/${id}/similar?limit=8`).then(r => r.json()),
      ]);
      renderModal(movie, sim.results);
      modal.classList.add("open");
      modal.scrollTop = 0;
    }

    function closeModal() { modal.classList.remove("open"); }

    // One delegated handler covers result cards and the modal's mini cards.
    document.addEventListener("click", (e) => {
      const tile = e.target.closest("[data-id]");
      if (tile) { openDetail(tile.dataset.id); return; }
      if (e.target.classList.contains("modal-close") || e.target === modal) closeModal();
    });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

    function renderPager(hasMore) {
      $("pager").innerHTML = `
        <button id="prevPage" ${currentPage === 0 ? "disabled" : ""}>Previous</button>
        <span class="page-label">Page ${currentPage + 1}</span>
        <button id="nextPage" ${hasMore ? "" : "disabled"}>Next</button>
      `;
      $("prevPage").addEventListener("click", () => {
        if (currentPage === 0) return;
        currentPage -= 1;
        search();
      });
      $("nextPage").addEventListener("click", () => {
        if (!hasMore) return;
        currentPage += 1;
        search();
      });
    }

    function syncSortOrderLabels() {
      const labels = {
        title: ["Z to A", "A to Z"],
        year: ["Newest first", "Oldest first"],
        rating: ["Highest first", "Lowest first"],
        popularity: ["Most popular", "Least popular"],
      }[$("sortBy").value] || ["High to low", "Low to high"];
      $("sortDir").options[0].textContent = labels[0];
      $("sortDir").options[1].textContent = labels[1];
    }

    function resetAndSearch() {
      currentPage = 0;
      syncSortOrderLabels();
      search();
    }

    async function search() {
      $("meta").textContent = "Searching…";
      const data = await fetch("/api/movies?" + buildQuery()).then(r => r.json());
      const start = currentPage * PAGE_SIZE + 1;
      const end = currentPage * PAGE_SIZE + data.count;
      $("meta").innerHTML = data.count
        ? `Results <span>(${start}-${end})</span>`
        : `Results <span>(0)</span>`;
      $("results").innerHTML = data.results.length
        ? data.results.map(card).join("")
        : `<div class="empty">No movies match those filters.</div>`;
      renderPager(data.has_more);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    $("search").addEventListener("click", resetAndSearch);
    $("sortBy").addEventListener("change", resetAndSearch);
    $("sortDir").addEventListener("change", resetAndSearch);
    syncSortOrderLabels();
    loadCollections();
    loadGenres().then(search);

    // --- AI companion chat ---
    const chatHistory = [];           // {role, content} text turns only
    const chatLog = $("chatLog");

    function scrollChat() { chatLog.scrollTop = chatLog.scrollHeight; }

    // Minimal, safe markdown for bot replies: escape first, then bold + bullets.
    function renderMarkdown(text) {
      const esc = text
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      return esc
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/(^|\n)\s*[\*\-]\s+/g, "$1• ");
    }

    function addMsg(text, cls) {
      const d = document.createElement("div");
      d.className = "msg " + cls;
      if (cls.startsWith("bot")) d.innerHTML = renderMarkdown(text);
      else d.textContent = text;
      chatLog.appendChild(d);
      scrollChat();
      return d;
    }

    function addMovies(movies) {
      if (!movies || !movies.length) return;
      const g = document.createElement("div");
      g.className = "chat-movies";
      g.innerHTML = movies.slice(0, 9).map(miniCard).join("");
      chatLog.appendChild(g);
      scrollChat();
    }

    $("chatFab").addEventListener("click", () => {
      $("chatPanel").classList.add("open");
      if (!chatHistory.length) {
        addMsg("Hi! Tell me what you're in the mood for — a genre, a vibe, or a movie you love — and I'll find something from the collection.", "bot");
      }
      $("chatInput").focus();
    });
    $("chatClose").addEventListener("click", () => $("chatPanel").classList.remove("open"));

    $("chatForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = $("chatInput").value.trim();
      if (!text) return;
      $("chatInput").value = "";
      addMsg(text, "user");
      chatHistory.push({ role: "user", content: text });

      const typing = document.createElement("div");
      typing.className = "typing";
      typing.textContent = "Thinking…";
      chatLog.appendChild(typing);
      scrollChat();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: chatHistory }),
        });
        typing.remove();
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          addMsg(err.detail || "Something went wrong.", "bot err");
          return;
        }
        const data = await res.json();
        addMsg(data.reply || "(no reply)", "bot");
        addMovies(data.movies);
        chatHistory.push({ role: "assistant", content: data.reply || "" });
      } catch (err) {
        typing.remove();
        addMsg("Couldn't reach the companion. Is the server running?", "bot err");
      }
    });
  </script>
</body>
</html>
