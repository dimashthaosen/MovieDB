<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MovieDB — Find your next movie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:#f5c518; --gold-h:#e2b200; --bg:#0a0a0a; --bg2:#161616;
      --card:#1c1c1c; --border:#2b2b2b; --text:#ffffff; --dim:#b3b3b3; --faint:#7c7c7c;
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; }
    body {
      min-height:100vh; background:var(--bg); color:var(--text);
      font-family:Archivo, system-ui, sans-serif; -webkit-font-smoothing:antialiased;
    }
    ::-webkit-scrollbar { height:8px; width:8px; }
    ::-webkit-scrollbar-thumb { background:#3a3a3a; border-radius:4px; }
    ::-webkit-scrollbar-thumb:hover { background:#4a4a4a; }
    ::-webkit-scrollbar-track { background:transparent; }
    @keyframes dcDot { 0%,80%,100%{opacity:.25;} 40%{opacity:1;} }

    /* ---- Header ---- */
    header {
      display:flex; align-items:center; gap:16px; padding:14px 32px; background:#101010;
      border-bottom:1px solid var(--border); position:sticky; top:0; z-index:20; backdrop-filter:blur(6px);
    }
    .logo { background:var(--gold); color:#000; font-weight:900; font-size:18px; letter-spacing:-.5px; padding:5px 10px; border-radius:7px; line-height:1; }
    .tagline { color:var(--faint); font-size:14px; font-weight:600; }
    .spacer { flex:1; }
    .search-wrap { position:relative; width:280px; max-width:40vw; }
    .search-wrap .mag { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--faint); font-size:15px; pointer-events:none; }
    .search-wrap input { width:100%; height:42px; background:#1f1f1f; border:1px solid #333; border-radius:9px; color:#fff; font-family:inherit; font-size:14px; padding:0 14px 0 34px; outline:none; }

    input:focus, select:focus, .search-wrap input:focus { border-color:var(--gold); }

    /* ---- Control bar ---- */
    .controls { display:flex; flex-wrap:wrap; align-items:flex-end; gap:18px; padding:22px 32px; background:var(--bg2); border-bottom:1px solid var(--border); }
    .field { display:flex; flex-direction:column; gap:7px; position:relative; }
    .field label { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--faint); font-weight:800; }
    .ctl { height:42px; background:#232323; border:1px solid #333; border-radius:9px; color:#fff; font-family:inherit; font-size:14px; padding:0 12px; outline:none; }
    select.ctl { font-weight:600; cursor:pointer; min-width:150px; }
    input.ctl::placeholder { color:var(--faint); }
    .genre-trigger {
      height:42px; min-width:190px; display:flex; align-items:center; justify-content:space-between; gap:10px;
      background:#232323; border:1px solid #333; border-radius:9px; color:var(--text); font-family:inherit;
      font-size:14px; font-weight:600; padding:0 14px; cursor:pointer;
    }
    .genre-trigger:hover { border-color:#4a4a4a; }
    .genre-trigger .lbl { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .genre-trigger .caret { color:var(--faint); font-size:11px; }
    .reset-btn { height:42px; background:transparent; border:1px solid #3a3a3a; border-radius:9px; color:var(--dim); font-family:inherit; font-size:13px; font-weight:700; padding:0 18px; cursor:pointer; }
    .reset-btn:hover { border-color:#555; color:#fff; }

    /* ---- Genre popover ---- */
    .popover-overlay { position:fixed; inset:0; z-index:29; }
    .popover { position:absolute; top:100%; left:0; margin-top:8px; z-index:30; width:340px; background:#1e1e1e; border:1px solid #383838; border-radius:12px; box-shadow:0 14px 40px rgba(0,0,0,.6); padding:12px; }
    .popover-top { display:flex; align-items:center; justify-content:space-between; padding:2px 4px 10px; }
    .seg { display:flex; gap:6px; background:#141414; border:1px solid #2e2e2e; border-radius:8px; padding:3px; }
    .seg button { height:28px; padding:0 12px; border:none; border-radius:6px; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; background:transparent; color:var(--dim); }
    .seg button.on { background:var(--gold); color:#000; }
    .clear-btn { background:none; border:none; color:var(--gold); font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; }
    .genre-pills { display:flex; flex-wrap:wrap; gap:8px; max-height:230px; overflow-y:auto; }
    .gpill { padding:7px 13px; border-radius:999px; font-family:inherit; font-size:12.5px; font-weight:600; cursor:pointer; transition:all .12s ease; background:#2a2a2a; color:var(--dim); border:1px solid #3a3a3a; }
    .gpill.on { background:var(--gold); color:#000; border:1px solid var(--gold); }

    /* ---- Collection chips ---- */
    .collections { display:flex; gap:10px; overflow-x:auto; padding:18px 32px 6px; }
    .chip { white-space:nowrap; display:flex; align-items:center; gap:6px; border-radius:999px; padding:8px 15px; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; transition:all .12s ease; background:#222; color:var(--dim); border:1px solid #353535; }
    .chip.on { background:var(--gold); color:#000; border:1px solid var(--gold); }
    .chip .cnt { font-size:11px; font-weight:700; opacity:.5; }
    .chip.on .cnt { opacity:.65; }

    /* ---- Result meta ---- */
    .meta { display:flex; align-items:baseline; gap:10px; padding:20px 32px 4px; }
    .meta .num { font-size:17px; font-weight:800; letter-spacing:-.01em; }
    .meta .lbl { font-size:14px; color:var(--faint); font-weight:500; }

    /* ---- Poster grid ---- */
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:22px 18px; padding:14px 32px 80px; }
    .card { cursor:pointer; }
    .poster { position:relative; aspect-ratio:2/3; border-radius:12px; overflow:hidden; border:1px solid rgba(255,255,255,.06); box-shadow:0 2px 8px rgba(0,0,0,.4); transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
    .card:hover .poster { transform:translateY(-5px); box-shadow:0 14px 30px rgba(0,0,0,.6); border-color:rgba(245,197,24,.5); }
    .poster img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; }
    .scrim { position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.45) 0%, rgba(0,0,0,0) 32%, rgba(0,0,0,0) 50%, rgba(0,0,0,.85) 100%); }
    .badge { position:absolute; top:11px; left:11px; display:flex; align-items:center; gap:4px; background:rgba(0,0,0,.6); backdrop-filter:blur(3px); border-radius:6px; padding:4px 8px; font-size:12.5px; font-weight:800; }
    .badge .star { color:var(--gold); }
    .topgenre { position:absolute; top:13px; right:12px; font-size:10.5px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:rgba(255,255,255,.7); }
    .caption { position:absolute; left:14px; right:14px; bottom:13px; }
    .caption .t { font-size:18px; font-weight:800; line-height:1.15; letter-spacing:-.01em; text-shadow:0 2px 8px rgba(0,0,0,.7); display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .caption .s { font-size:12.5px; font-weight:600; color:rgba(255,255,255,.65); margin-top:5px; }

    .empty { padding:80px 32px; text-align:center; color:var(--faint); }
    .empty .ico { font-size:34px; margin-bottom:10px; opacity:.5; }
    .empty .msg { font-size:16px; font-weight:600; }
    .empty button { margin-top:16px; background:var(--gold); color:#000; border:none; border-radius:9px; font-family:inherit; font-size:13px; font-weight:800; padding:10px 20px; cursor:pointer; }

    /* ---- Detail modal ---- */
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.84); z-index:50; display:none; align-items:flex-start; justify-content:center; padding:48px 16px; overflow-y:auto; backdrop-filter:blur(4px); }
    .modal-backdrop.open { display:flex; }
    .modal { position:relative; background:#161616; border:1px solid var(--border); border-radius:16px; max-width:880px; width:100%; overflow:hidden; }
    .modal-close { position:absolute; top:14px; right:16px; z-index:3; width:36px; height:36px; border-radius:50%; background:rgba(0,0,0,.55); border:1px solid rgba(255,255,255,.12); color:#fff; font-size:18px; line-height:1; cursor:pointer; }
    .modal-close:hover { background:rgba(0,0,0,.85); }
    .hero { display:flex; gap:26px; padding:26px; }
    .hero-poster { width:210px; flex-shrink:0; aspect-ratio:2/3; border-radius:12px; overflow:hidden; position:relative; border:1px solid rgba(255,255,255,.08); }
    .hero-poster img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    .hero-poster .pscrim { position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(0,0,0,.8) 100%); }
    .hero-poster .pt { position:absolute; left:14px; right:14px; bottom:14px; font-size:19px; font-weight:800; line-height:1.15; text-shadow:0 2px 8px rgba(0,0,0,.7); }
    .hero-info { flex:1; min-width:0; }
    .hero-info h2 { margin:6px 40px 0 0; font-size:27px; font-weight:800; line-height:1.15; letter-spacing:-.02em; }
    .hero-meta { display:flex; flex-wrap:wrap; gap:6px 16px; align-items:center; color:var(--dim); font-size:14px; font-weight:600; margin:14px 0 16px; }
    .hero-meta .rate { color:var(--gold); font-weight:800; display:inline-flex; align-items:center; gap:4px; }
    .hero-meta .votes { color:var(--faint); }
    .gchips { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:18px; }
    .gchips span { background:#262626; border:1px solid #383838; border-radius:999px; padding:5px 13px; font-size:12.5px; font-weight:600; color:var(--dim); }
    .overview { color:var(--dim); line-height:1.65; font-size:15px; margin:0; }
    .similar-wrap { padding:4px 26px 26px; }
    .similar-wrap h3 { font-size:15px; font-weight:800; margin:8px 0 14px; letter-spacing:-.01em; }
    .similar-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(118px,1fr)); gap:14px; }
    .mini { cursor:pointer; }
    .mini .poster { border-radius:9px; box-shadow:none; }
    .mini:hover .poster { transform:translateY(-3px); border-color:rgba(255,255,255,.06); box-shadow:none; }
    .mini .mscrim { position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(0,0,0,.82) 100%); }
    .mini .mbadge { position:absolute; top:7px; left:7px; display:flex; align-items:center; gap:3px; background:rgba(0,0,0,.6); border-radius:5px; padding:2px 6px; font-size:10.5px; font-weight:800; }
    .mini .mbadge .star { color:var(--gold); }
    .mini .mt { position:absolute; left:9px; right:9px; bottom:9px; font-size:12px; font-weight:700; line-height:1.2; text-shadow:0 1px 5px rgba(0,0,0,.8); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .mini .shared { font-size:11px; color:var(--gold); font-weight:700; margin-top:6px; }

    /* ---- AI chat ---- */
    .fab { position:fixed; bottom:24px; right:24px; z-index:40; width:58px; height:58px; border-radius:50%; background:var(--gold); border:none; cursor:pointer; font-size:24px; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 20px rgba(0,0,0,.5); transition:transform .14s ease; }
    .fab:hover { transform:scale(1.07); }
    .chat-panel { position:fixed; bottom:24px; right:24px; z-index:41; width:380px; max-width:calc(100vw - 32px); height:560px; max-height:calc(100vh - 48px); background:#161616; border:1px solid var(--border); border-radius:16px; display:none; flex-direction:column; overflow:hidden; box-shadow:0 16px 44px rgba(0,0,0,.65); }
    .chat-panel.open { display:flex; }
    .chat-head { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; background:#101010; border-bottom:1px solid var(--border); }
    .chat-head .id { display:flex; align-items:center; gap:10px; }
    .chat-head .av { width:34px; height:34px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; font-size:18px; }
    .chat-head .nm { font-weight:800; font-size:14px; line-height:1.2; }
    .chat-head .sub { color:var(--faint); font-size:11px; font-weight:500; }
    .chat-close { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; line-height:1; }
    .chat-log { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
    .bubble { max-width:88%; padding:10px 14px; font-size:14px; line-height:1.5; white-space:pre-wrap; }
    .bubble.user { align-self:flex-end; max-width:85%; border-radius:14px 14px 4px 14px; background:var(--gold); color:#000; font-weight:500; }
    .bubble.bot { align-self:flex-start; border-radius:14px 14px 14px 4px; background:#262626; color:var(--text); }
    .chat-movies { align-self:flex-start; width:100%; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:-4px; }
    .chat-movies .poster { border-radius:7px; box-shadow:none; }
    .chat-movies .cm-t { position:absolute; left:6px; right:6px; bottom:6px; font-size:9.5px; font-weight:700; line-height:1.15; text-shadow:0 1px 4px rgba(0,0,0,.8); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .typing { align-self:flex-start; display:flex; gap:4px; padding:10px 14px; background:#262626; border-radius:14px; }
    .typing span { width:7px; height:7px; border-radius:50%; background:var(--faint); animation:dcDot 1.2s infinite ease; }
    .typing span:nth-child(2) { animation-delay:.2s; }
    .typing span:nth-child(3) { animation-delay:.4s; }
    .chat-form { display:flex; gap:8px; padding:12px; border-top:1px solid var(--border); background:#101010; }
    .chat-form input { flex:1; height:42px; background:#232323; border:1px solid #333; border-radius:9px; color:#fff; font-family:inherit; font-size:14px; padding:0 14px; outline:none; }
    .chat-form button { height:42px; background:var(--gold); color:#000; border:none; border-radius:9px; font-family:inherit; font-size:14px; font-weight:800; padding:0 18px; cursor:pointer; }
  </style>
</head>
<body>
  <header>
    <span class="logo">MovieDB</span>
    <span class="tagline">Find your next movie</span>
    <div class="spacer"></div>
    <div class="search-wrap">
      <span class="mag">⌕</span>
      <input id="search" type="text" placeholder="Search titles" autocomplete="off" />
    </div>
  </header>

  <div class="controls">
    <div class="field" id="genreField">
      <label>Genres</label>
      <button class="genre-trigger" id="genreTrigger">
        <span class="lbl" id="genreLabel">All genres</span>
        <span class="caret">▼</span>
      </button>
      <!-- popover injected here -->
    </div>
    <div class="field">
      <label>Year from</label>
      <input class="ctl" id="yearMin" type="number" placeholder="1970" style="width:100px" />
    </div>
    <div class="field">
      <label>Year to</label>
      <input class="ctl" id="yearMax" type="number" placeholder="2024" style="width:100px" />
    </div>
    <div class="field">
      <label>Min rating</label>
      <input class="ctl" id="ratingMin" type="number" min="0" max="10" step="0.5" placeholder="0.0" style="width:96px" />
    </div>
    <div class="field">
      <label>Sort by</label>
      <select class="ctl" id="sortBy">
        <option value="popularity">Popularity</option>
        <option value="rating">Rating</option>
        <option value="year">Year</option>
        <option value="title">Title</option>
      </select>
    </div>
    <div class="spacer"></div>
    <button class="reset-btn" id="reset">Reset filters</button>
  </div>

  <div class="collections" id="collections"></div>
  <div class="meta" id="meta"></div>
  <div id="results"></div>

  <div class="modal-backdrop" id="modal"><div class="modal" id="modalContent"></div></div>

  <button class="fab" id="fab" title="Ask the AI movie companion" aria-label="Ask AI">🤖</button>
  <div class="chat-panel" id="chatPanel">
    <div class="chat-head">
      <div class="id">
        <span class="av">🎬</span>
        <div><div class="nm">Movie Companion</div><div class="sub">Ask for a recommendation</div></div>
      </div>
      <button class="chat-close" id="chatClose" aria-label="Close">×</button>
    </div>
    <div class="chat-log" id="chatLog"></div>
    <form class="chat-form" id="chatForm">
      <input id="chatInput" type="text" placeholder="e.g. a short feel-good sci-fi" autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

    const state = {
      allGenres: [], genres: [], genreMatch: "any", genreMenuOpen: false,
      yearMin: "", yearMax: "", ratingMin: "", sortBy: "popularity",
      collections: [], activeCollection: null, query: "",
      results: [], lastCount: 0,
      modalId: null,
      chatOpen: false, chatMessages: [], typing: false,
    };

    // Deterministic poster gradient (matches design tokens) for missing images.
    const PALETTES = [
      ["#214d4f","#0c1c1d"],["#4a2333","#1c0d13"],["#26264f","#0f0f22"],
      ["#234d2c","#0d1d12"],["#4a3a1f","#1c160c"],["#3a234f","#160d22"],
      ["#1f3550","#0c1622"],["#4a2c1f","#1c100c"],["#2f4a4a","#101f1f"],
      ["#43204a","#190c1c"],["#4a4220","#1c190c"],["#1f4a44","#0c1c1a"],
    ];
    function gradientFor(id) {
      const i = (((Math.abs(id) - 1) % PALETTES.length) + PALETTES.length) % PALETTES.length;
      const p = PALETTES[i];
      return `linear-gradient(155deg, ${p[0]} 0%, ${p[1]} 100%)`;
    }
    function posterLayer(m) {
      const bg = `background:${gradientFor(m.id)}`;
      const img = m.poster_url ? `<img src="${esc(m.poster_url)}" alt="" loading="lazy" />` : "";
      return { bg, img };
    }
    const ratingText = (r) => (r ? Number(r).toFixed(1) : "–");
    const minimal = (text) => esc(text)
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/(^|\n)\s*[\*\-]\s+/g, "$1• ");

    /* ---------------- data ---------------- */
    async function api(path) {
      const r = await fetch(path);
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }

    function buildQuery() {
      const p = new URLSearchParams();
      state.genres.forEach((id) => p.append("genres", id));
      p.set("genre_match", state.genreMatch);
      if (state.yearMin) p.set("year_min", state.yearMin);
      if (state.yearMax) p.set("year_max", state.yearMax);
      if (state.ratingMin) p.set("rating_min", state.ratingMin);
      if (state.activeCollection) p.set("collection", state.activeCollection);
      p.set("sort_by", state.sortBy);
      p.set("sort_dir", state.sortBy === "title" ? "asc" : "desc");
      p.set("limit", "60");
      return p.toString();
    }

    let fetchTimer = null;
    function scheduleFetch(delay = 0) {
      clearTimeout(fetchTimer);
      fetchTimer = setTimeout(fetchMovies, delay);
    }
    async function fetchMovies() {
      try {
        const data = await api("/api/movies?" + buildQuery());
        state.results = data.results || [];
        state.lastCount = data.count ?? state.results.length;
      } catch (e) {
        state.results = [];
        state.lastCount = 0;
      }
      renderGrid();
    }

    function visibleMovies() {
      const q = state.query.trim().toLowerCase();
      if (!q) return state.results;
      return state.results.filter((m) => (m.title || "").toLowerCase().includes(q));
    }

    /* ---------------- render: grid + meta ---------------- */
    function genreLabelText() {
      if (state.genres.length === 0) return "All genres";
      if (state.genres.length === 1) {
        const g = state.allGenres.find((x) => x.id === state.genres[0]);
        return g ? g.name : "1 selected";
      }
      return state.genres.length + " selected";
    }

    function cardHTML(m) {
      const { bg, img } = posterLayer(m);
      const sub = m.release_year ? esc(m.release_year) + (m.runtime ? " · " + m.runtime + " min" : "") : (m.runtime ? m.runtime + " min" : "—");
      const top = (m.genres && m.genres[0]) ? esc(m.genres[0]) : "";
      return `
        <div class="card" data-id="${m.id}">
          <div class="poster" style="${bg}">
            ${img}
            <div class="scrim"></div>
            <div class="badge"><span class="star">★</span>${ratingText(m.rating)}</div>
            <div class="topgenre">${top}</div>
            <div class="caption">
              <div class="t">${esc(m.title)}</div>
              <div class="s">${sub}</div>
            </div>
          </div>
        </div>`;
    }

    function renderGrid() {
      const list = visibleMovies();
      // meta
      const bits = [];
      if (state.activeCollection) {
        const c = state.collections.find((x) => x.slug === state.activeCollection);
        if (c) bits.push(c.label);
      }
      if (state.genres.length) bits.push(genreLabelText());
      const summary = bits.length ? " · " + bits.join(" · ") : "";
      $("meta").innerHTML = `<span class="num">${list.length}</span><span class="lbl">titles${esc(summary)}</span>`;

      if (!list.length) {
        $("results").innerHTML = `
          <div class="empty">
            <div class="ico">🎞️</div>
            <div class="msg">No movies match those filters.</div>
            <button id="emptyReset">Reset filters</button>
          </div>`;
        const er = $("emptyReset");
        if (er) er.addEventListener("click", resetFilters);
        return;
      }
      $("results").innerHTML = `<div class="grid">${list.map(cardHTML).join("")}</div>`;
    }

    /* ---------------- render: genres ---------------- */
    function renderGenreTrigger() { $("genreLabel").textContent = genreLabelText(); }

    function renderGenrePopover() {
      const existing = $("genrePopover");
      if (existing) existing.remove();
      const overlay = $("genreOverlay");
      if (overlay) overlay.remove();
      if (!state.genreMenuOpen) return;

      const ov = document.createElement("div");
      ov.className = "popover-overlay"; ov.id = "genreOverlay";
      ov.addEventListener("click", () => { state.genreMenuOpen = false; renderGenrePopover(); });

      const pop = document.createElement("div");
      pop.className = "popover"; pop.id = "genrePopover";
      pop.innerHTML = `
        <div class="popover-top">
          <div class="seg">
            <button data-m="any" class="${state.genreMatch === "any" ? "on" : ""}">Any</button>
            <button data-m="all" class="${state.genreMatch === "all" ? "on" : ""}">All</button>
          </div>
          <button class="clear-btn" id="clearGenres">Clear</button>
        </div>
        <div class="genre-pills">
          ${state.allGenres.map((g) => `<button class="gpill ${state.genres.includes(g.id) ? "on" : ""}" data-gid="${g.id}">${esc(g.name)}</button>`).join("")}
        </div>`;

      pop.querySelectorAll(".seg button").forEach((b) =>
        b.addEventListener("click", () => { state.genreMatch = b.dataset.m; renderGenrePopover(); fetchMovies(); })
      );
      pop.querySelector("#clearGenres").addEventListener("click", () => { state.genres = []; renderGenrePopover(); renderGenreTrigger(); fetchMovies(); });
      pop.querySelectorAll(".gpill").forEach((b) =>
        b.addEventListener("click", () => {
          const id = Number(b.dataset.gid);
          state.genres = state.genres.includes(id) ? state.genres.filter((x) => x !== id) : state.genres.concat([id]);
          renderGenrePopover(); renderGenreTrigger(); fetchMovies();
        })
      );
      $("genreField").appendChild(ov);
      $("genreField").appendChild(pop);
    }

    /* ---------------- render: collections ---------------- */
    function renderCollections() {
      const chips = [`<button class="chip ${!state.activeCollection ? "on" : ""}" data-slug=""><span>🎬</span><span>All</span></button>`];
      for (const c of state.collections) {
        chips.push(`<button class="chip ${state.activeCollection === c.slug ? "on" : ""}" data-slug="${esc(c.slug)}"><span>${c.emoji}</span><span>${esc(c.label)}</span><span class="cnt">${c.count ?? ""}</span></button>`);
      }
      const bar = $("collections");
      bar.innerHTML = chips.join("");
      bar.querySelectorAll(".chip").forEach((ch) =>
        ch.addEventListener("click", () => {
          state.activeCollection = ch.dataset.slug || null;
          renderCollections(); fetchMovies();
        })
      );
    }

    /* ---------------- modal ---------------- */
    function miniHTML(m, sharedLabel) {
      const { bg, img } = posterLayer(m);
      const shared = sharedLabel != null ? `<div class="shared">${sharedLabel}</div>` : "";
      return `
        <div class="mini" data-id="${m.id}">
          <div class="poster" style="${bg}">
            ${img}
            <div class="mscrim"></div>
            <div class="mbadge"><span class="star">★</span>${ratingText(m.rating)}</div>
            <div class="mt">${esc(m.title)}</div>
          </div>
          ${shared}
        </div>`;
    }

    async function openModal(id) {
      state.modalId = id;
      $("modal").classList.add("open");
      $("modalContent").innerHTML = `<div style="padding:60px;text-align:center;color:var(--faint)">Loading…</div>`;
      try {
        const [m, sim] = await Promise.all([
          api(`/api/movies/${id}`),
          api(`/api/movies/${id}/similar?limit=8`),
        ]);
        renderModal(m, sim.results || []);
      } catch (e) {
        $("modalContent").innerHTML = `<div style="padding:60px;text-align:center;color:var(--faint)">Couldn't load this title.</div>`;
      }
    }

    function renderModal(m, similar) {
      const { bg, img } = posterLayer(m);
      const lang = m.original_language ? m.original_language.toUpperCase() : "";
      const runtime = m.runtime ? m.runtime + " min" : "";
      const vc = m.vote_count || 0;
      const votes = vc >= 1e6 ? (vc / 1e6).toFixed(1) + "M votes"
        : vc >= 1000 ? Math.round(vc / 1000) + "K votes"
        : vc > 0 ? vc + " votes" : "";
      const metaParts = [
        `<span class="rate">★ ${ratingText(m.rating)}</span>`,
        m.release_year ? `<span>${esc(m.release_year)}</span>` : "",
        runtime ? `<span>${runtime}</span>` : "",
        lang ? `<span>${lang}</span>` : "",
        votes ? `<span class="votes">${votes}</span>` : "",
      ].filter(Boolean).join("");
      const simHTML = similar.length
        ? similar.map((s) => miniHTML(s, (s.shared_genres || 0) + " shared genre" + (s.shared_genres === 1 ? "" : "s"))).join("")
        : `<p style="color:var(--faint)">No similar titles found.</p>`;
      $("modalContent").innerHTML = `
        <button class="modal-close" id="modalClose">×</button>
        <div class="hero">
          <div class="hero-poster" style="${bg}">
            ${img}
            <div class="pscrim"></div>
            <div class="pt">${esc(m.title)}</div>
          </div>
          <div class="hero-info">
            <h2>${esc(m.title)}</h2>
            <div class="hero-meta">${metaParts}</div>
            <div class="gchips">${(m.genres || []).map((g) => `<span>${esc(g)}</span>`).join("")}</div>
            <p class="overview">${esc(m.overview || "No overview available.")}</p>
          </div>
        </div>
        <div class="similar-wrap">
          <h3>More like this</h3>
          <div class="similar-grid">${simHTML}</div>
        </div>`;
      $("modalClose").addEventListener("click", closeModal);
    }
    function closeModal() { state.modalId = null; $("modal").classList.remove("open"); }

    /* ---------------- chat ---------------- */
    function renderChat() {
      const log = $("chatLog");
      let html = "";
      for (const msg of state.chatMessages) {
        html += `<div class="bubble ${msg.role === "user" ? "user" : "bot"}">${msg.role === "user" ? esc(msg.text) : minimal(msg.text)}</div>`;
        if (msg.movies && msg.movies.length) {
          html += `<div class="chat-movies">` + msg.movies.slice(0, 9).map((s) => {
            const { bg, img } = posterLayer(s);
            return `<div class="mini" data-id="${s.id}"><div class="poster" style="${bg}">${img}<div class="mscrim"></div><div class="cm-t">${esc(s.title)}</div></div></div>`;
          }).join("") + `</div>`;
        }
      }
      if (state.typing) html += `<div class="typing"><span></span><span></span><span></span></div>`;
      log.innerHTML = html;
      log.scrollTop = log.scrollHeight;
    }

    async function sendChat(text) {
      state.chatMessages.push({ role: "user", text });
      state.typing = true;
      renderChat();
      try {
        const history = state.chatMessages.map((m) => ({ role: m.role === "user" ? "user" : "assistant", content: m.text }));
        const r = await fetch("/api/chat", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history }),
        });
        state.typing = false;
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          state.chatMessages.push({ role: "bot", text: err.detail || "Something went wrong." });
        } else {
          const data = await r.json();
          state.chatMessages.push({ role: "bot", text: data.reply || "(no reply)", movies: data.movies || [] });
        }
      } catch (e) {
        state.typing = false;
        state.chatMessages.push({ role: "bot", text: "Couldn't reach the companion. Is the server running?" });
      }
      renderChat();
    }

    /* ---------------- filters / events ---------------- */
    function resetFilters() {
      state.genres = []; state.genreMatch = "any"; state.yearMin = ""; state.yearMax = "";
      state.ratingMin = ""; state.sortBy = "popularity"; state.activeCollection = null; state.query = "";
      $("yearMin").value = ""; $("yearMax").value = ""; $("ratingMin").value = "";
      $("sortBy").value = "popularity"; $("search").value = "";
      renderGenreTrigger(); renderGenrePopover(); renderCollections(); fetchMovies();
    }

    $("search").addEventListener("input", (e) => { state.query = e.target.value; renderGrid(); });
    $("yearMin").addEventListener("input", (e) => { state.yearMin = e.target.value; scheduleFetch(350); });
    $("yearMax").addEventListener("input", (e) => { state.yearMax = e.target.value; scheduleFetch(350); });
    $("ratingMin").addEventListener("input", (e) => { state.ratingMin = e.target.value; scheduleFetch(350); });
    $("sortBy").addEventListener("change", (e) => { state.sortBy = e.target.value; fetchMovies(); });
    $("reset").addEventListener("click", resetFilters);
    $("genreTrigger").addEventListener("click", () => { state.genreMenuOpen = !state.genreMenuOpen; renderGenrePopover(); });

    // Delegated click for any poster card / mini (grid, modal, chat) -> open detail.
    document.addEventListener("click", (e) => {
      const tile = e.target.closest("[data-id]");
      if (tile) { openModal(Number(tile.dataset.id)); return; }
      if (e.target === $("modal")) closeModal();
    });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

    // Chat
    $("fab").addEventListener("click", () => {
      state.chatOpen = true;
      $("chatPanel").classList.add("open");
      if (!state.chatMessages.length) {
        state.chatMessages.push({ role: "bot", text: "Hi! Tell me what you're in the mood for — a genre, a vibe, or a movie you love — and I'll find something for you." });
      }
      renderChat();
      $("chatInput").focus();
    });
    $("chatClose").addEventListener("click", () => { state.chatOpen = false; $("chatPanel").classList.remove("open"); });
    $("chatForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const text = $("chatInput").value.trim();
      if (!text) return;
      $("chatInput").value = "";
      sendChat(text);
    });

    /* ---------------- init ---------------- */
    async function init() {
      try { state.allGenres = await api("/api/genres"); } catch (e) { state.allGenres = []; }
      renderGenreTrigger();
      try { state.collections = await api("/api/collections"); } catch (e) { state.collections = []; }
      renderCollections();
      await fetchMovies();
    }
    init();
  </script>
</body>
</html>
