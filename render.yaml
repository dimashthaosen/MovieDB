# Render Blueprint — deploys the MovieDB FastAPI app as a web service.
# The app is stateless and serves live from the TMDb API (no database), so the
# only setup is the two API keys, set in the Render dashboard.
services:
  - type: web
    name: moviedb
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: TMDB_API_KEY
        sync: false        # required at runtime — every request fetches from TMDb
      - key: OPENROUTER_API_KEY
        sync: false        # required for the AI companion
